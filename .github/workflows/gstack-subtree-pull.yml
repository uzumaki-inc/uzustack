name: gstack subtree pull (monthly)

# 月 1 で gstack 本家から `_upstream/gstack/` を最新化する自動 PR を生成する。
# 衝突なし → feature ブランチに push + PR 自動作成
# 変更なし → no-op で終了
# 衝突 / その他失敗 → workflow が fail、GitHub の通知でメンテナーに伝わる
#
# 手動実行：Actions タブの "gstack subtree pull (monthly)" → "Run workflow"
# または `gh workflow run gstack-subtree-pull.yml`

on:
  schedule:
    - cron: '0 0 1 * *'  # 毎月 1 日 00:00 UTC（09:00 JST）
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  subtree-pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # subtree pull は完全な履歴が必要

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create feature branch
        id: branch
        run: |
          BRANCH="chore/gstack-subtree-pull-$(date -u +%Y%m%d)"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
          # 同日 2 回目の手動実行対応：既存ブランチがあれば削除
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"

      - name: Run subtree pull
        run: |
          git subtree pull \
            --prefix _upstream/gstack \
            https://github.com/garrytan/gstack.git \
            main \
            --squash

      - name: Detect changes
        id: detect
        run: |
          if git diff origin/main --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No upstream changes since last subtree pull. Skipping PR creation."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push and create PR
        if: steps.detect.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git push -u origin "$BRANCH"
          DATE=$(date -u +%Y-%m-%d)
          gh pr create \
            --title "chore: gstack subtree pull (auto, $DATE)" \
            --body "$(cat <<'PRBODY'
          自動生成された subtree pull PR です。

          ## レビュー手順

          1. diff stat を確認し、想定外の量・領域に変更が及んでいないか確認
          2. uzustack 独自部分（repo top の skill / setup / bin / README 等）に影響がないことを確認
          3. 翻訳済み skill（frontmatter `type: translated`）の `_upstream/gstack/<skill>/` 側に変更があれば、step 23 の rebase 手順で再翻訳を検討
          4. OK なら squash merge

          衝突や想定外の挙動があれば手動 fallback（`gh pr close` → 手動 subtree pull → 手動 PR）。

          ---
          🤖 Generated by `.github/workflows/gstack-subtree-pull.yml`
          PRBODY
          )" \
            --base main \
            --head "$BRANCH"
